openapi: 3.1.0
info:
  title: NX Playground Media API
  description: Media (Image) API — ported to TypeSpec from media.openapi.yaml (protobuf/gRPC-gateway derived).
  version: 0.0.0
tags:
  - name: media
paths:
  /media/image/_batch_delete:
    post:
      operationId: Images_batchDelete
      summary: Batch delete images
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchDeleteResponse'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RpcStatus'
      tags:
        - media
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchDeleteRequest'
  /media/image/_complete:
    post:
      operationId: Images_complete
      summary: Complete upload / report image status
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RpcStatus'
      tags:
        - media
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StatusRequest'
  /media/image/signed-url:
    delete:
      operationId: Images_clear
      summary: Clear staged signed-url uploads
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClearResponse'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RpcStatus'
      tags:
        - media
  /media/image/signed-url/_batch:
    post:
      operationId: Images_batchUpload
      summary: Batch create signed upload URLs
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadResponse'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RpcStatus'
      tags:
        - media
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadRequest'
  /media/image/{id}:
    get:
      operationId: Images_getImageUri
      summary: Get image URI by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: variant
          in: query
          required: false
          schema:
            type: string
          explode: false
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageResponse'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RpcStatus'
      tags:
        - media
  /media/image/{imageId}:
    delete:
      operationId: Images_delete
      summary: Delete image by id
      parameters:
        - name: imageId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteResponse'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RpcStatus'
      tags:
        - media
components:
  schemas:
    BatchDeleteRequest:
      type: object
      properties:
        imageIds:
          type: array
          items:
            type: string
    BatchDeleteResponse:
      type: object
      properties:
        message:
          type: string
    ClearResponse:
      type: object
      properties:
        message:
          type: string
    DeleteResponse:
      type: object
      properties:
        message:
          type: string
    ImageFormat:
      type: string
      enum:
        - NOT_SUPPORT
        - PNG
        - GIF
        - JPEG
        - WEBP
        - SVG
        - HEIC
      description: Supported image formats
    ImageMetadata:
      type: object
      properties:
        width:
          type: integer
          format: int64
          description: width > 0 and < 10000
        height:
          type: integer
          format: int64
          description: height > 0 and < 10000
        format:
          $ref: '#/components/schemas/ImageFormat'
        size:
          type: string
          description: size > 0 and < 10MB (uint64 as string)
        uploadTime:
          type: string
          description: RFC3339
      description: Image metadata
    ImageResponse:
      type: object
      properties:
        uri:
          type: string
    ImageStatus:
      type: object
      properties:
        imageId:
          type: string
          description: non-empty; letters, digits, hyphen only
        metadata:
          $ref: '#/components/schemas/ImageMetadata'
        variants:
          type: object
          unevaluatedProperties:
            type: string
          description: at least one element
    RpcStatus:
      type: object
      properties:
        code:
          type: integer
          format: int32
        message:
          type: string
        details:
          type: array
          items:
            type: object
            unevaluatedProperties: {}
      description: Standard error envelope (gRPC-gateway rpcStatus equivalent)
    SignedUrl:
      type: object
      properties:
        imageId:
          type: string
          description: non-empty; letters, digits, hyphen only
        signedUrl:
          type: string
          description: non-empty; HTTP or HTTPS URL
    StatusRequest:
      type: object
      properties:
        imageIds:
          type: array
          items:
            type: string
    StatusResponse:
      type: object
      properties:
        images:
          type: array
          items:
            $ref: '#/components/schemas/ImageStatus'
    UploadImage:
      type: object
      properties:
        contentType:
          $ref: '#/components/schemas/ImageFormat'
        size:
          type: string
          description: size > 0 and < 10MB
        width:
          type: integer
          format: int64
        height:
          type: integer
          format: int64
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double
      description: One image to upload
    UploadRequest:
      type: object
      properties:
        images:
          type: array
          items:
            $ref: '#/components/schemas/UploadImage'
    UploadResponse:
      type: object
      properties:
        images:
          type: array
          items:
            $ref: '#/components/schemas/SignedUrl'
