openapi: 3.1.0
info:
  title: NX Playground Event API
  description: |-
    Event API — ported to TypeSpec from event.openapi.yaml (was protobuf/gRPC-gateway derived).
    One module, two interfaces: ConsoleEvents (admin CRUD) + PublicEvents (public read/search).
    Field names kept snake_case to preserve the existing wire contract.
  version: 0.0.0
tags:
  - name: event
paths:
  /console/events:
    get:
      operationId: ConsoleEvents_list
      summary: Get list of events with filtering and pagination
      parameters:
        - name: page_token
          in: query
          required: false
          schema:
            type: string
          explode: false
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int32
          explode: false
        - name: page_size
          in: query
          required: false
          schema:
            type: integer
            format: int32
          explode: false
        - name: status
          in: query
          required: false
          schema:
            type: string
          explode: false
        - name: visibility
          in: query
          required: false
          schema:
            type: string
          explode: false
        - name: title_search
          in: query
          required: false
          schema:
            type: string
          explode: false
        - name: sort_by
          in: query
          required: false
          schema:
            type: string
          explode: false
        - name: sort_order
          in: query
          required: false
          schema:
            type: string
          explode: false
        - name: session_start_time_from
          in: query
          required: false
          schema:
            type: string
          explode: false
        - name: session_start_time_to
          in: query
          required: false
          schema:
            type: string
          explode: false
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventListResponse'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RpcStatus'
      tags:
        - event
    post:
      operationId: ConsoleEvents_create
      summary: Create event (always created as draft)
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateEventResponse'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RpcStatus'
      tags:
        - event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEventRequest'
  /console/events/{id}:
    get:
      operationId: ConsoleEvents_read
      summary: Get event by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RpcStatus'
      tags:
        - event
    patch:
      operationId: ConsoleEvents_update
      summary: Patch event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RpcStatus'
      tags:
        - event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchEventBody'
    delete:
      operationId: ConsoleEvents_delete
      summary: Delete event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RpcStatus'
      tags:
        - event
  /console/events/{id}/sessions/{session_id}:
    delete:
      operationId: ConsoleEvents_deleteSession
      summary: Delete a session of an event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: session_id
          in: path
          required: true
          schema:
            type: string
      responses:
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RpcStatus'
      tags:
        - event
  /console/events/{id}/status:
    put:
      operationId: ConsoleEvents_updateStatus
      summary: Update event status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RpcStatus'
      tags:
        - event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEventStatusBody'
  /events:
    get:
      operationId: PublicEvents_search
      summary: Search public events
      parameters:
        - name: page_token
          in: query
          required: false
          schema:
            type: string
          explode: false
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int32
          explode: false
        - name: page_size
          in: query
          required: false
          schema:
            type: integer
            format: int32
          explode: false
        - name: brand_id
          in: query
          required: false
          schema:
            type: string
          explode: false
        - name: title_search
          in: query
          required: false
          schema:
            type: string
          explode: false
        - name: sort_by
          in: query
          required: false
          schema:
            type: string
          explode: false
        - name: sort_order
          in: query
          required: false
          schema:
            type: string
          explode: false
        - name: session_start_time_from
          in: query
          required: false
          schema:
            type: string
          explode: false
        - name: session_start_time_to
          in: query
          required: false
          schema:
            type: string
          explode: false
        - name: location_lat
          in: query
          required: false
          schema:
            type: number
            format: double
          explode: false
        - name: location_lng
          in: query
          required: false
          schema:
            type: number
            format: double
          explode: false
        - name: location_radius
          in: query
          required: false
          schema:
            type: number
            format: double
          explode: false
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventListResponse'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RpcStatus'
      tags:
        - event
  /events/{id}:
    get:
      operationId: PublicEvents_read
      summary: Get a public event by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RpcStatus'
      tags:
        - event
components:
  schemas:
    CreateEventRequest:
      type: object
      properties:
        title:
          type: string
        summary:
          type: string
        visibility:
          type: string
        cover_image_url:
          type: string
        location:
          $ref: '#/components/schemas/Location'
        sessions:
          type: array
          items:
            $ref: '#/components/schemas/Session'
        detail:
          type: array
          items:
            $ref: '#/components/schemas/DetailBlock'
        faq:
          type: array
          items:
            $ref: '#/components/schemas/FAQ'
    CreateEventResponse:
      type: object
      properties:
        id:
          type: string
        created_at:
          type: string
    DetailBlock:
      type: object
      properties:
        type:
          type: string
        text_data:
          $ref: '#/components/schemas/TextData'
        image_data:
          $ref: '#/components/schemas/ImageData'
      description: Detail block for structured content
    Event:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        brand_id:
          type: string
        summary:
          type: string
        status:
          type: string
          description: draft, published, archived
        visibility:
          type: string
          description: public, private
        cover_image_url:
          type: string
        location:
          $ref: '#/components/schemas/Location'
        sessions:
          type: array
          items:
            $ref: '#/components/schemas/Session'
        detail:
          type: array
          items:
            $ref: '#/components/schemas/DetailBlock'
        faq:
          type: array
          items:
            $ref: '#/components/schemas/FAQ'
        created_at:
          type: string
        created_by:
          type: string
        updated_at:
          type: string
        updated_by:
          type: string
      description: Core Event message
    EventListResponse:
      type: object
      properties:
        events:
          type: array
          items:
            $ref: '#/components/schemas/Event'
        pagination:
          $ref: '#/components/schemas/Pagination'
    FAQ:
      type: object
      properties:
        question:
          type: string
        answer:
          type: string
      description: FAQ entry
    GeoJSONPoint:
      type: object
      properties:
        type:
          type: string
          description: Always "Point"
        coordinates:
          type: array
          items:
            type: number
            format: double
      description: 'GeoJSON Point: coordinates are [longitude, latitude]'
    ImageData:
      type: object
      properties:
        url:
          type: string
        alt:
          type: string
        caption:
          type: string
      description: Image block data
    Location:
      type: object
      properties:
        name:
          type: string
        address:
          type: string
        place_id:
          type: string
        coordinates:
          $ref: '#/components/schemas/GeoJSONPoint'
      description: Location with GeoJSON Point structure
    Pagination:
      type: object
      properties:
        next_page_token:
          type: string
        prev_page_token:
          type: string
        has_next:
          type: boolean
        has_prev:
          type: boolean
        total_count:
          type: integer
          format: int32
        current_page:
          type: integer
          format: int32
        total_pages:
          type: integer
          format: int32
    PatchEventBody:
      type: object
      properties:
        title:
          type: string
        summary:
          type: string
        visibility:
          type: string
        cover_image_url:
          type: string
        location:
          $ref: '#/components/schemas/Location'
        sessions:
          type: array
          items:
            $ref: '#/components/schemas/Session'
        detail:
          type: array
          items:
            $ref: '#/components/schemas/DetailBlock'
        faq:
          type: array
          items:
            $ref: '#/components/schemas/FAQ'
    RpcStatus:
      type: object
      properties:
        code:
          type: integer
          format: int32
        message:
          type: string
        details:
          type: array
          items:
            type: object
            unevaluatedProperties: {}
      description: Standard error envelope (gRPC-gateway rpcStatus equivalent)
    Session:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
          description: Session name (optional)
        capacity:
          type: integer
          format: int32
          description: Capacity limit; omitted means unlimited
        start_time:
          type: string
          description: RFC3339
        end_time:
          type: string
          description: RFC3339
      description: Session for time-based event scheduling
    TextData:
      type: object
      properties:
        content:
          type: string
      description: Text block data
    UpdateEventStatusBody:
      type: object
      properties:
        status:
          type: string
      description: draft|published|archived
