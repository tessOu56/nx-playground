name: Deploy Profile to Cloudflare Pages

# STOP automatic deploy (2026-07-07): push trigger removed — see docs/DEPLOY-CLOUDFLARE-RETIREMENT.md
# Manual maintenance only via workflow_dispatch + DEPLOY confirmation.

on:
  workflow_dispatch:
    inputs:
      reason:
        description: Maintenance reason (audit trail)
        required: true
        type: string
      confirm:
        description: Type DEPLOY to confirm (non-routine maintenance)
        required: true
        type: string

concurrency:
  group: deploy-profile-cloudflare
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Pages (maintenance)
    steps:
      - name: Confirm manual maintenance
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "DEPLOY" ]; then
            echo "::error::Confirmation failed. Type DEPLOY in the confirm field."
            exit 1
          fi
          echo "Manual deploy reason: ${{ github.event.inputs.reason }}"

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          version: 9

      - name: Setup Node.js
        uses