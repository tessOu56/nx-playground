name: Deploy Profile to Cloudflare Pages

# STOP automatic deploy (2026-07-07): push trigger removed — see docs/DEPLOY-CLOUDFLARE-RETIREMENT.md
# Manual maintenance only via workflow_dispatch + DEPLOY confirmation.

on:
  workflow_dispatch:
    inputs:
      reason:
        description: Maintenance reason (audit trail)
        required: true
        type: string
      confirm:
        description: Type DEPLOY to confirm (non-routine maintenance)
        required: true
        type: string

concurrency:
  group: deploy-profile-cloudflare
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Pages (maintenance)
    steps:
      - name: Confirm manual maintenance
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "DEPLOY" ]; then
            echo "::error::Confirmation failed. Type DEPLOY in the confirm field."
            exit 1
          fi
          echo "Manual deploy reason: ${{ github.event.inputs.reason }}"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build profile app
        run: pnpm exec nx build @nx-playground/profile --configuration=production

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: nx-playground-profile
          directory: dist/apps/profile
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: main
