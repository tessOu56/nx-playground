name: contracts-ci

on:
  push:
    branches: [main]
    paths:
      - 'libs/contracts/**'
      - 'libs/api-client/specs/**'
      - '.github/workflows/contracts-ci.yml'
  pull_request:
    paths:
      - 'libs/contracts/**'
      - 'libs/api-client/specs/**'
  workflow_dispatch:

jobs:
  typespec-compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # Isolated install: monorepo pnpm-lock is out of sync (vue-motion pinia); contracts only.
      - name: Install TypeSpec toolchain
        working-directory: libs/contracts
        run: npm install --no-save @typespec/compiler@^1.13.0 @typespec/http@^1.13.0 @typespec/openapi3@^1.13.0
      - name: tsp compile
        working-directory: libs/contracts
        run: npx tsp compile main.tsp --config tspconfig.yaml
      - name: verify OpenAPI artifacts
        run: |
          test -f libs/api-client/specs/catalog.openapi.yaml
          test -f libs/api-client/specs/event.openapi.yaml
          test -f libs/api-client/specs/media.openapi.yaml
      - name: spectral lint (catalog)
        run: |
          npm install --no-save @stoplight/spectral-cli@6.15.0 @stoplight/spectral-rulesets
          npx spectral lint libs/api-client/specs/catalog.openapi.yaml -r @stoplight/spectral-rulesets/oas --fail-severity error
